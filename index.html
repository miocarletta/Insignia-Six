<style>
:root{--bg:#01040a;--card:rgba(10,25,45,0.45);--border:rgba(74,142,219,0.2);--text:#e1e7f0;--accent:#00d4ff;--safe:#4de37d;--danger:#ff1f1f;--mio:#ffffff;--pena:#4a8edb;--vania:#8dcaff;--mizu:#acb9c9;--pulu:#4de37d;--al:#888888;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{height:100dvh;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;position:fixed;width:100%;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:30px 30px;z-index:0;}
.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:20000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:48px;height:48px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:3px;animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.cyber-guard{position:fixed;top:8px;right:8px;width:160px;background:rgba(0,5,2,.96);border:1px solid var(--safe);font-family:'Share Tech Mono',monospace;font-size:7px;padding:7px;color:var(--safe);z-index:10000;border-radius:2px;overflow:hidden;transition:border-color .2s,color .2s;}
.scan-line{width:100%;height:1px;background:var(--safe);opacity:.2;position:absolute;left:0;animation:scanMove 3s linear infinite;}
@keyframes scanMove{0%{top:0;}100%{top:100%;}}
.online-dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px;}
.o-dot{width:7px;height:7px;border-radius:50%;opacity:.2;transition:all .4s;flex-shrink:0;}
.o-dot.on{opacity:1;box-shadow:0 0 5px currentColor;}
.danger-overlay{position:fixed;inset:0;background:rgba(255,0,0,.08);z-index:9998;display:none;pointer-events:none;border:3px solid var(--danger);}
.proximity-alert{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--danger);color:#fff;padding:8px 18px;border-radius:6px;font-family:'Share Tech Mono';font-size:11px;z-index:10001;transition:transform .3s;white-space:nowrap;}
.proximity-alert.show{transform:translateX(-50%) translateY(0);}
.notif-toast{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-100px);background:rgba(10,25,45,.96);border:1px solid var(--accent);border-radius:10px;padding:10px 16px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent);z-index:9999;transition:transform .3s;backdrop-filter:blur(10px);max-width:90vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.notif-toast.show{transform:translateX(-50%) translateY(0);}
.screen{display:none;position:fixed;inset:0;z-index:10;flex-direction:column;align-items:center;justify-content:center;padding:16px;}
.screen.active{display:flex;}
.auth-wrap{background:var(--card);padding:28px 24px;border-radius:14px;width:min(320px,94vw);text-align:center;border:2px solid var(--accent);box-shadow:0 0 30px rgba(0,212,255,.15);backdrop-filter:blur(12px);}
.auth-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;margin-bottom:6px;letter-spacing:2px;}
.auth-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);margin-bottom:20px;letter-spacing:2px;}
#agentSelect{width:100%;padding:12px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;margin-bottom:12px;outline:none;}
#accessCode{width:100%;padding:14px;text-align:center;background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:6px;color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:1.2rem;letter-spacing:6px;outline:none;margin-bottom:14px;}
.btn-auth{width:100%;padding:14px;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;letter-spacing:2px;border:1px solid var(--accent);background:rgba(0,212,255,.05);color:var(--accent);border-radius:6px;cursor:pointer;transition:all .2s;}
.btn-auth:active{background:rgba(0,212,255,.15);}
#authStatus{font-family:'Share Tech Mono',monospace;font-size:10px;min-height:16px;margin-top:8px;}
#screenLobby{justify-content:flex-start;padding-top:20px;padding-left:180px;padding-right:180px;}
.chat-wrap{width:min(420px,100%);height:100dvh;display:flex;flex-direction:column;padding:8px 0 0;}
.lobby-header{display:flex;justify-content:space-between;align-items:center;padding:10px 0 8px;flex-shrink:0;}
#myIdentity{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:1px;}
.btn-terminate{background:none;border:none;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:8px;opacity:.4;cursor:pointer;padding:4px 8px;}
.chat-area{flex:1;background:var(--card);border-radius:12px;border:1px solid var(--border);overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;backdrop-filter:blur(10px);-webkit-overflow-scrolling:touch;min-height:0;}
.chat-area::-webkit-scrollbar{width:2px;}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);}
.msg-bubble{padding:9px 13px;border-radius:4px 12px 12px 12px;font-size:13px;max-width:78%;line-height:1.5;border:1px solid rgba(255,255,255,.07);backdrop-filter:blur(5px);animation:msgIn .25s ease;word-break:break-word;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg-mine{align-self:flex-end;border-radius:12px 4px 12px 12px;}
.msg-MIO{background:rgba(255,255,255,.05);border-color:var(--mio);}
.msg-PENA{background:rgba(74,142,219,.1);border-color:var(--pena);}
.msg-VANIA{background:rgba(141,202,255,.08);border-color:var(--vania);}
.msg-MIZU{background:rgba(172,185,201,.08);border-color:var(--mizu);}
.msg-PULU{background:rgba(77,227,125,.1);border-color:var(--pulu);}
.msg-AL{background:rgba(136,136,136,.08);border-color:var(--al);}
.msg-sender{font-size:8px;font-weight:bold;opacity:.5;margin-bottom:2px;}
.msg-time{font-size:8px;opacity:.3;margin-top:3px;font-family:'Share Tech Mono',monospace;}
.msg-mine .msg-time{text-align:right;}
.typing-row{height:18px;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent);opacity:.6;flex-shrink:0;padding:2px 0;}
.call-row{display:flex;gap:8px;margin:8px 0;flex-shrink:0;}
.btn-call{flex:1;padding:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:9px;letter-spacing:1px;border:1px solid var(--border);background:none;color:var(--text);border-radius:4px;cursor:pointer;transition:all .15s;}
.btn-call:active{background:rgba(255,255,255,.06);}
.btn-call.active-call{border-color:var(--safe)!important;color:var(--safe)!important;background:rgba(77,227,125,.1)!important;}
.btn-call.public-call{border-color:rgba(0,212,255,.3);color:var(--accent);}
.input-row{display:flex;gap:8px;align-items:center;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,4px);}
#msgInput{flex:1;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px;padding:13px 14px;color:#fff;outline:none;font-family:'Share Tech Mono',monospace;font-size:13px;transition:border-color .2s;}
#msgInput:focus{border-color:rgba(0,212,255,.4);}
.btn-send{width:46px;height:46px;border-radius:50%;background:var(--accent);color:var(--bg);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(0,212,255,.4);flex-shrink:0;}
.btn-send:active{transform:scale(.92);}
#radarContainer{position:fixed;top:20px;left:20px;width:150px;height:150px;z-index:1000;display:none;}
.radar-ring{width:100%;height:100%;border:2px solid var(--accent);border-radius:50%;position:relative;background:radial-gradient(circle,rgba(0,212,255,.1) 0%,transparent 70%);animation:radarPulse 2s infinite;}
@keyframes radarPulse{0%{box-shadow:0 0 0 0 rgba(0,212,255,.5);}70%{box-shadow:0 0 0 15px rgba(0,212,255,0);}100%{box-shadow:0 0 0 0 rgba(0,212,255,0);}}
.radar-sweep{position:absolute;top:50%;left:50%;width:50%;height:1px;background:linear-gradient(90deg,transparent,var(--accent));transform-origin:left center;animation:sweep 3s linear infinite;}
@keyframes sweep{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.radar-dot{position:absolute;width:8px;height:8px;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 6px currentColor;transition:all .5s;}
.radar-info{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--accent);margin-top:4px;text-align:center;}
#callBubble{position:fixed;bottom:24px;right:20px;width:72px;height:72px;border-radius:50%;background:var(--safe);display:none;align-items:center;justify-content:center;font-size:22px;z-index:1000;border:3px solid rgba(255,255,255,.3);box-shadow:0 0 28px var(--safe);cursor:pointer;}
.danger-msg{color:var(--danger)!important;font-weight:bold;text-shadow:0 0 5px var(--danger);}
</style>
</head>
